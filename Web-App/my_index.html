<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarFind — Search Engine</title>
  <link rel="stylesheet" href="my_style.css" />
</head>
<body>

  <!-- ── Nav ─────────────────────────────────────────────────────── -->
  <header class="navbar">
    <span class="logo">Car<span class="logo-accent">Find</span></span>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- ── Hero / Search ────────────────────────────────────────────── -->
  <main>
    <section class="hero">
      <h1>Automotive Search Engine</h1>
      <p class="subtitle">Powered by IR techniques — ranking, clustering &amp; query expansion</p>

      <div class="search-bar">
        <input type="text" id="UserInput" placeholder="Search for bmw, electric vehicle, formula one…" autocomplete="off" />
        <button id="searchBtn" onclick="search(); queryToGoogleBing()">Search</button>
      </div>

      <!-- Options panel -->
      <div class="options-panel">

        <div class="option-group">
          <span class="group-label">Relevance</span>
          <label class="pill">
            <input type="radio" name="type" value="page_rank" checked />
            <span>Page Rank</span>
          </label>
          <label class="pill">
            <input type="radio" name="type" value="hits" />
            <span>HITS</span>
          </label>
        </div>

        <div class="divider-v"></div>

        <div class="option-group">
          <span class="group-label">Clustering</span>
          <label class="pill">
            <input type="radio" name="type" value="flat_clustering" />
            <span>Flat (K-Means)</span>
          </label>
          <label class="pill">
            <input type="radio" name="type" value="hierarchical_clustering" />
            <span>Single Link</span>
          </label>
          <label class="pill">
            <input type="radio" name="type" value="dummy_clustering" />
            <span>Complete Link</span>
          </label>
        </div>

        <div class="divider-v"></div>

        <div class="option-group">
          <span class="group-label">Query Expansion</span>
          <label class="pill">
            <input type="radio" name="type" value="association_qe" />
            <span>Association</span>
          </label>
          <label class="pill">
            <input type="radio" name="type" value="metric_qe" />
            <span>Metric</span>
          </label>
          <label class="pill">
            <input type="radio" name="type" value="scalar_qe" />
            <span>Scalar</span>
          </label>
        </div>

      </div><!-- /options-panel -->
    </section>

    <!-- ── Results ───────────────────────────────────────────────── -->
    <section class="results-section" id="resultsSection" hidden>
      <div class="results-header">
        <h2>Results <span id="expandedQuery" class="expanded-query"></span></h2>
      </div>
      <div id="resultsList" class="results-list"></div>
    </section>

    <!-- ── Comparison engines ────────────────────────────────────── -->
    <section class="compare-section" id="compareSection" hidden>

      <div class="compare-pane">
        <div class="pane-header">
          <img src="https://www.google.com/favicon.ico" width="18" alt="" />
          Google Results
        </div>
        <iframe id="google" src="about:blank" title="Google Search"></iframe>
      </div>

      <div class="compare-pane">
        <div class="pane-header">
          <img src="https://www.bing.com/favicon.ico" width="18" alt="" />
          Bing Results
        </div>
        <iframe id="bing" src="about:blank" title="Bing Search"></iframe>
      </div>

    </section>
  </main>

  <!-- ── Footer ───────────────────────────────────────────────────── -->
  <footer>
    <p>CarFind &mdash; Information Retrieval Course Project &bull; Powered by Apache Solr</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="my_script.js"></script>

  <!-- Prevent form submit on Enter -->
  <script>
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        search();
        queryToGoogleBing();
      }
    });
  </script>
</body>
</html>
